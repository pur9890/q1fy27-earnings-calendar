name: Update & deploy earnings calendar

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you run it manually from the Actions tab
  schedule:
    - cron: "30 2 * * *"    # every day at 02:30 UTC = 08:00 IST

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape MoneyControl and build the calendar
        run: |
          python update_calendar.py
          # Fill in approximate times for any newly-added companies (incremental).
          # If BSE is unreachable from the runner, keep the existing committed times.
          python build_release_times.py || echo "time-builder skipped; using existing times"
          # Rebuild so the freshly-found times are baked into the page.
          python update_calendar.py
          mkdir -p _site
          cp earnings_calendar.html _site/index.html
          cp earnings_data.json _site/earnings_data.json || true

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
