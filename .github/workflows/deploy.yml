name: Update & deploy earnings calendar

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you run it manually from the Actions tab
  schedule:
    # GitHub's free cron is best-effort and can drop individual runs (esp. on
    # busy round minutes). Several odd-minute morning attempts make a full miss
    # very unlikely; whichever fires first refreshes the page. UTC = IST - 5:30.
    - cron: "17 2 * * *"    # 07:47 IST
    - cron: "37 2 * * *"    # 08:07 IST
    - cron: "57 2 * * *"    # 08:27 IST
    - cron: "23 3 * * *"    # 08:53 IST
    - cron: "33 14 * * *"   # 20:03 IST (evening safety net, ~8 PM)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape MoneyControl and build the calendar
        run: |
          # FAST MODE: only refresh the calendar + regenerate pages from the committed
          # data files. The incremental data-fetch builders (times/tickers/actuals via
          # BSE + Screener) are temporarily disabled because they made deploys slow;
          # committed release_times.json / tickers.json / actuals.json are used as-is.
          # Re-enable (optimized) later:
          #   python build_release_times.py || echo "time-builder skipped"
          #   python build_tickers.py       || echo "ticker-builder skipped"
          #   python build_actuals.py       || echo "actuals-builder skipped"
          python update_calendar.py
          # Rebuild so the freshly-found times, tickers and actuals are baked into the page.
          python update_calendar.py
          mkdir -p _site
          cp earnings_calendar.html _site/index.html
          cp estimates.html _site/estimates.html || true
          cp earnings_data.json _site/earnings_data.json || true
          cp estimates.json _site/estimates.json || true

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
